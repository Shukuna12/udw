<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bài tập 4</title>
</head>
<body>

    <h2 style="text-align: center;">KẾT QUẢ HỌC TẬP</h2>

    <table border="1" width="80%" align="center" cellspacing="0" cellpadding="5">
        <thead>
            <!-- Hàng tiêu đề 1 -->
            <tr bgcolor="#d3d3d3" align="center">
                <th rowspan="2">Họ tên</th>
                <th colspan="3">Môn học</th>
                <th rowspan="2">Kết quả</th>
            </tr>
            <!-- Hàng tiêu đề 2 -->
            <tr bgcolor="#d3d3d3" align="center">
                <th>Toán</th>
                <th>Văn</th>
                <th>Ngoại ngữ</th>
            </tr>
        </thead>
        <tbody>
            <!-- Dữ liệu học sinh 1 -->
            <tr align="center">
                <td align="left">Trần Văn Thành</td>
                <td>8</td>
                <td>5</td>
                <td>7</td>
                <td bgcolor="yellow" style="color: black;"><b>Đạt</b></td>
            </tr>
            <!-- Dữ liệu học sinh 2 -->
            <tr align="center">
                <td align="left">Lê Thanh Sơn</td>
                <td>4</td>
                <td>9</td>
                <td>6</td>
                <td bgcolor="red" style="color: white;"><b>Không đạt</b></td>
            </tr>
            <!-- Dữ liệu học sinh 3 -->
            <tr align="center">
                <td align="left">Nguyễn Thị Tuyết</td>
                <td>8</td>
                <td>9</td>
                <td>5</td>
                <td bgcolor="yellow" style="color: black;"><b>Đạt</b></td>
            </tr>
        </tbody>
        <tfoot>
            <!-- Hàng tổng kết -->
            <tr>
                <td colspan="4"><b>Tổng số học sinh đạt</b></td>
                <td align="center">2</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
